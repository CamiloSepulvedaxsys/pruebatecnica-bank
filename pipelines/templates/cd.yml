# =============================================================================
# Stage CD - Despliegue Continuo a AKS (Azure Kubernetes Service)
# Agente: Self-hosted Windows | Service Connection: flask-app-aks
# =============================================================================
parameters:
  - name: fullImage
    type: string
  - name: tag
    type: string
    default: "$(Build.BuildId)"
  - name: resourceGroup
    type: string
    default: "rg-pruebatecnica"
  - name: clusterName
    type: string
    default: "aks-pruebatecnica"
  - name: serviceConnection
    type: string
    default: "flask-app-aks"

stages:
  - stage: CD
    displayName: "CD - Deploy to AKS"
    dependsOn: CI
    condition: succeeded()
    jobs:
      - deployment: DeployAKS
        displayName: "Deploy a Azure Kubernetes Service"
        environment: "flask-app-aks"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # -------------------------------------------------------------------
                # Configurar kubectl via Service Connection
                # -------------------------------------------------------------------
                - task: Kubernetes@1
                  displayName: "Login a AKS (Service Connection)"
                  inputs:
                    connectionType: "Kubernetes Service Connection"
                    kubernetesServiceEndpoint: "${{ parameters.serviceConnection }}"
                    command: "login"

                # -------------------------------------------------------------------
                # Crear namespace y secreto de Docker Hub para pull de imagenes
                # -------------------------------------------------------------------
                - powershell: |
                    kubectl create namespace flask-app --dry-run=client -o yaml | kubectl apply -f -
                    kubectl create secret docker-registry dockerhub-secret `
                      --docker-server=https://index.docker.io/v1/ `
                      --docker-username="$(DOCKER_USER_VAR)" `
                      --docker-password="$(DOCKER_PASS)" `
                      -n flask-app --dry-run=client -o yaml | kubectl apply -f -
                    Write-Host "Namespace y secreto Docker Hub configurados"
                  displayName: "Configurar namespace y secretos"

                # -------------------------------------------------------------------
                # NGINX Ingress Controller: gestionado por Terraform con IP estatica
                # (ver environment/nginx-ingress-values.yaml + terraform/kubernetes.tf)
                # -------------------------------------------------------------------

                # -------------------------------------------------------------------
                # Reemplazar placeholder de imagen en deployment.yaml
                # -------------------------------------------------------------------
                - powershell: |
                    $File = "environment/deployment.yaml"
                    $Content = Get-Content $File -Raw
                    $Content = $Content -replace "__IMAGE__", "${{ parameters.fullImage }}:${{ parameters.tag }}"
                    Set-Content -Path $File -Value $Content -NoNewline
                    Write-Host "Imagen configurada: ${{ parameters.fullImage }}:${{ parameters.tag }}"
                    Select-String -Path $File -Pattern "image:"
                  displayName: "Configurar imagen en manifiestos"

                # -------------------------------------------------------------------
                # Aplicar todos los manifiestos de Kubernetes
                # -------------------------------------------------------------------
                - powershell: |
                    Write-Host "Aplicando manifiestos de Kubernetes a AKS..."
                    kubectl apply -f environment/namespace.yaml
                    kubectl apply -f environment/configmap.yaml
                    kubectl apply -f environment/deployment.yaml
                    kubectl apply -f environment/service.yaml
                    kubectl apply -f environment/ingress.yaml
                    Write-Host ""
                    Write-Host "========================================"
                    Write-Host " Manifiestos aplicados exitosamente"
                    Write-Host " Imagen: ${{ parameters.fullImage }}:${{ parameters.tag }}"
                    Write-Host " Cluster: ${{ parameters.clusterName }}"
                    Write-Host "========================================"
                  displayName: "kubectl apply - Deploy a AKS"

                # -------------------------------------------------------------------
                # Esperar rollout y verificar estado del deploy
                # -------------------------------------------------------------------
                - powershell: |
                    Write-Host "Esperando rollout del deployment..."
                    kubectl rollout status deployment/flask-app -n flask-app --timeout=180s

                    Write-Host ""
                    Write-Host "========================================"
                    Write-Host " Estado del cluster AKS"
                    Write-Host "========================================"
                    kubectl get all -n flask-app
                    Write-Host ""
                    kubectl get ingress -n flask-app

                    Write-Host ""
                    Write-Host "========================================"
                    Write-Host " Verificacion del endpoint"
                    Write-Host "========================================"
                    Write-Host "Probando endpoint en IP estatica..."
                    try {
                      $response = Invoke-RestMethod -Uri "http://20.114.65.15" -TimeoutSec 15
                      Write-Host ($response | ConvertTo-Json -Compress)
                      Write-Host "URL Publica: http://20.114.65.15"
                    } catch {
                      Write-Host "Endpoint aun iniciando, verificar: http://20.114.65.15"
                    }
                    Write-Host "========================================"
                  displayName: "Verificar deploy y endpoint externo"
