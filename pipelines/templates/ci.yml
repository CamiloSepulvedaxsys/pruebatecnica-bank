# =============================================================================
# Stage CI - Integración Continua (Microsoft-hosted Ubuntu)
# Contiene: SonarQube (2 escenarios), Docker Build & Push, Scripts paralelos
# =============================================================================
parameters:
  - name: sonarHostUrl
    type: string
    default: "https://sonarcloud.io"
  - name: dockerUser
    type: string
  - name: imageName
    type: string
    default: "flask-app"
  - name: tag
    type: string
    default: "$(Build.BuildId)"

stages:
  - stage: CI
    displayName: "CI - Build, Test & Analyze"
    jobs:
      # =====================================================================
      # Job 1: SonarQube - Escenario FALLIDO (simulado)
      # =====================================================================
      - job: SonarQube_Failed
        displayName: "SonarQube - Escenario Fallido"
        steps:
          - script: |
              echo "============================================="
              echo " ESCENARIO 1: Simulacion de analisis FALLIDO "
              echo "============================================="
              echo ""
              echo "En este escenario se demuestra que ocurre cuando"
              echo "el Quality Gate de SonarQube NO se cumple."
              echo ""
              echo "Causas tipicas de fallo:"
              echo "  - Cobertura de codigo menor a 80%%"
              echo "  - Duplicacion mayor a 3%%"
              echo "  - Bugs o vulnerabilidades detectadas"
              echo "  - Code smells por encima del umbral"
              echo ""
              echo "Simulando ejecucion de tests SIN cobertura..."
              pip install -r app/requirements.txt -q
              cd app && python -m pytest tests/ -v --tb=short || true
              echo ""
              echo "RESULTADO: Quality Gate FAILED (sin reporte de cobertura)"
              echo "El pipeline NO continuaria a build en un escenario real."
              echo "============================================="
            displayName: "Tests sin cobertura (simulacion fallo)"

          - script: |
              echo "##vso[task.logissue type=warning]ESCENARIO 1: Quality Gate FAILED - Cobertura insuficiente"
              echo "##vso[task.complete result=SucceededWithIssues;]Escenario 1 completado con advertencias"
            displayName: "Marcar escenario como fallido"

      # =====================================================================
      # Job 2: SonarQube - Escenario EXITOSO (con cobertura + análisis)
      # =====================================================================
      - job: SonarQube_Success
        displayName: "SonarQube - Escenario Exitoso"
        steps:
          - script: |
              pip install -r app/requirements.txt -q
            displayName: "Instalar dependencias"

          - script: |
              echo "============================================="
              echo " ESCENARIO 2: Analisis EXITOSO               "
              echo "============================================="
              cd app && python -m pytest tests/ -v --cov=. --cov-report=xml:../coverage.xml --junitxml=../test-results.xml
              echo ""
              echo "Tests pasaron con cobertura completa."
            displayName: "Tests con cobertura"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "test-results.xml"
            displayName: "Publicar resultados de tests"

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: "coverage.xml"
            displayName: "Publicar cobertura de codigo"

          - script: |
              echo "Instalando sonar-scanner CLI..."
              export SONAR_SCANNER_VERSION=5.0.1.3006
              curl -sSLo /tmp/sonar-scanner.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux.zip"
              unzip -q /tmp/sonar-scanner.zip -d /tmp/
              export PATH="/tmp/sonar-scanner-${SONAR_SCANNER_VERSION}-linux/bin:$PATH"
              echo "Ejecutando analisis SonarQube..."
              sonar-scanner \
                -Dsonar.host.url=${{ parameters.sonarHostUrl }} \
                -Dsonar.token=$(SONAR_TOKEN)
              echo "Analisis completado. Quality Gate: OK"
            displayName: "SonarQube - Analisis y Quality Gate"

      # =====================================================================
      # Job 3: Docker Build & Push (depende de SonarQube exitoso)
      # =====================================================================
      - job: DockerBuildPush
        displayName: "Docker Build & Push"
        dependsOn: SonarQube_Success
        steps:
          - script: |
              echo "$(DOCKER_PASS)" | docker login -u "${{ parameters.dockerUser }}" --password-stdin
              echo "Login exitoso a Docker Hub"
            displayName: "Docker Login"

          - script: |
              docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
              docker buildx create --use --name multiarch
              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                -t ${{ parameters.dockerUser }}/${{ parameters.imageName }}:${{ parameters.tag }} \
                -t ${{ parameters.dockerUser }}/${{ parameters.imageName }}:latest \
                --push .
              echo "Build y push completado (multi-arch: amd64 + arm64)"
            displayName: "Docker Build & Push (Multi-arch)"

          - script: |
              docker logout
              echo "Imagen publicada: ${{ parameters.dockerUser }}/${{ parameters.imageName }}:${{ parameters.tag }}"
              echo "Imagen publicada: ${{ parameters.dockerUser }}/${{ parameters.imageName }}:latest"
            displayName: "Docker Logout + Resumen"

      # =====================================================================
      # Job 4: Script - Hola Mundo x10 (PARALELO con Job 5)
      # =====================================================================
      - job: HolaMundo
        displayName: "Script - Hola Mundo x10 (Paralelo)"
        dependsOn: DockerBuildPush
        steps:
          - script: |
              echo "========================================"
              echo " Imprimiendo Hola Mundo 10 veces"
              echo "========================================"
              for i in $(seq 1 10); do echo "[$i/10] Hola Mundo"; done
              echo "========================================"
              echo " Completado."
              echo "========================================"
            displayName: "Bash - Hola Mundo x10"

      # =====================================================================
      # Job 5: Script - Crear 10 archivos con fecha (PARALELO con Job 4)
      # =====================================================================
      - job: CrearArchivos
        displayName: "Script - Crear 10 archivos (Paralelo)"
        dependsOn: DockerBuildPush
        steps:
          - script: |
              echo "========================================"
              echo " Creando 10 archivos con fecha actual"
              echo "========================================"

              OUTPUT_DIR="$BUILD_STAGINGDIRECTORY/archivos_fecha"
              mkdir -p "$OUTPUT_DIR"

              for i in $(seq 1 10); do
                FECHA=$(date '+%Y-%m-%d %H:%M:%S')
                FILENAME="archivo_$i.txt"
                FILEPATH="$OUTPUT_DIR/$FILENAME"
                CONTENIDO="Archivo $i - Creado el: $FECHA"
                echo "$CONTENIDO" > "$FILEPATH"
                echo "Creado: $FILENAME -> $CONTENIDO"
              done

              echo ""
              echo "========================================"
              echo " Contenido de los archivos creados:"
              echo "========================================"

              for f in "$OUTPUT_DIR"/*.txt; do
                echo ""
                echo "--- $(basename "$f") ---"
                cat "$f"
              done

              echo ""
              echo "========================================"
              echo " Completado: 10 archivos creados."
              echo "========================================"
            displayName: "Bash - Crear y mostrar 10 archivos con fecha"
