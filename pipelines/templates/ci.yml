# =============================================================================
# Stage CI - Integracion Continua (Self-hosted Windows)
# Contiene: SonarQube (2 escenarios), Docker Build & Push, Scripts paralelos
# =============================================================================
parameters:
  - name: sonarHostUrl
    type: string
    default: "https://sonarcloud.io"
  - name: dockerUser
    type: string
  - name: imageName
    type: string
    default: "flask-app"
  - name: tag
    type: string
    default: "$(Build.BuildId)"

stages:
  - stage: CI
    displayName: "CI - Build, Test & Analyze"
    jobs:
      # =====================================================================
      # Job 1: SonarQube - Escenario FALLIDO (simulado)
      # =====================================================================
      - job: SonarQube_Failed
        displayName: "SonarQube - Escenario Fallido"
        steps:
          - powershell: |
              Write-Host "============================================="
              Write-Host " ESCENARIO 1: Simulacion de analisis FALLIDO "
              Write-Host "============================================="
              Write-Host ""
              Write-Host "En este escenario se demuestra que ocurre cuando"
              Write-Host "el Quality Gate de SonarQube NO se cumple."
              Write-Host ""
              Write-Host "Causas tipicas de fallo:"
              Write-Host "  - Cobertura de codigo menor a 80%"
              Write-Host "  - Duplicacion mayor a 3%"
              Write-Host "  - Bugs o vulnerabilidades detectadas"
              Write-Host "  - Code smells por encima del umbral"
              Write-Host ""
              Write-Host "Simulando ejecucion de tests SIN cobertura..."
              py -m pip install -r app/requirements.txt -q
              Set-Location app
              py -m pytest tests/ -v --tb=short
              if ($LASTEXITCODE -ne 0) { Write-Host "Tests fallaron (esperado en simulacion)" }
              Write-Host ""
              Write-Host "RESULTADO: Quality Gate FAILED (sin reporte de cobertura)"
              Write-Host "El pipeline NO continuaria a build en un escenario real."
              Write-Host "============================================="
            displayName: "Tests sin cobertura (simulacion fallo)"
            errorActionPreference: continue

          - powershell: |
              Write-Host "##vso[task.logissue type=warning]ESCENARIO 1: Quality Gate FAILED - Cobertura insuficiente"
              Write-Host "##vso[task.complete result=SucceededWithIssues;]Escenario 1 completado con advertencias"
            displayName: "Marcar escenario como fallido"

      # =====================================================================
      # Job 2: SonarQube - Escenario EXITOSO (con cobertura + analisis)
      # =====================================================================
      - job: SonarQube_Success
        displayName: "SonarQube - Escenario Exitoso"
        steps:
          - powershell: |
              py -m pip install -r app/requirements.txt -q
            displayName: "Instalar dependencias"

          - powershell: |
              Write-Host "============================================="
              Write-Host " ESCENARIO 2: Analisis EXITOSO               "
              Write-Host "============================================="
              Set-Location app
              py -m pytest tests/ -v --cov=. --cov-report=xml:../coverage.xml --junitxml=../test-results.xml
              if ($LASTEXITCODE -ne 0) { throw "Tests fallaron" }
              Write-Host ""
              Write-Host "Tests pasaron con cobertura completa."
            displayName: "Tests con cobertura"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "test-results.xml"
            displayName: "Publicar resultados de tests"

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: "coverage.xml"
            displayName: "Publicar cobertura de codigo"

          - powershell: |
              Write-Host "Instalando sonar-scanner CLI..."
              $SONAR_VERSION = "5.0.1.3006"
              $TEMP_DIR = if ($env:AGENT_TEMPDIRECTORY) { $env:AGENT_TEMPDIRECTORY } else { $env:TEMP }
              $ZIP_URL = "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-$SONAR_VERSION-windows.zip"
              $ZIP_PATH = "$TEMP_DIR\sonar-scanner.zip"
              Invoke-WebRequest -Uri $ZIP_URL -OutFile $ZIP_PATH -UseBasicParsing
              Expand-Archive -Path $ZIP_PATH -DestinationPath $TEMP_DIR -Force
              $SCANNER = "$TEMP_DIR\sonar-scanner-$SONAR_VERSION-windows\bin\sonar-scanner.bat"
              Write-Host "Ejecutando analisis SonarCloud..."
              & $SCANNER "-Dsonar.host.url=${{ parameters.sonarHostUrl }}" "-Dsonar.token=$(SONAR_TOKEN)" "-Dsonar.qualitygate.wait=true"
              if ($LASTEXITCODE -ne 0) {
                Write-Host "##vso[task.logissue type=warning]Quality Gate FAILED - Ver detalles en SonarCloud"
                Write-Host "Quality Gate no paso, pero el analisis se completo. Ver: https://sonarcloud.io/dashboard?id=projectscamilo_pruebatecnica"
              } else {
                Write-Host "Analisis completado. Quality Gate: PASSED"
              }
              exit 0
            displayName: "SonarCloud - Analisis y Quality Gate"

      # =====================================================================
      # Job 3: Docker Build & Push (depende de SonarQube exitoso)
      # =====================================================================
      - job: DockerBuildPush
        displayName: "Docker Build & Push"
        dependsOn: SonarQube_Success
        steps:
          - powershell: |
              $env:DOCKER_PASS | docker login -u "${{ parameters.dockerUser }}" --password-stdin
              if ($LASTEXITCODE -ne 0) { throw "Docker login failed" }
              Write-Host "Login exitoso a Docker Hub"
            displayName: "Docker Login"
            env:
              DOCKER_PASS: $(DOCKER_PASS)

          - powershell: |
              docker buildx rm multiarch 2>$null
              docker buildx create --use --name multiarch
              docker buildx build `
                --platform linux/amd64,linux/arm64 `
                -t "${{ parameters.dockerUser }}/${{ parameters.imageName }}:${{ parameters.tag }}" `
                -t "${{ parameters.dockerUser }}/${{ parameters.imageName }}:latest" `
                --push .
              if ($LASTEXITCODE -ne 0) { throw "Docker build failed" }
              Write-Host "Build y push completado (multi-arch: amd64 + arm64)"
            displayName: "Docker Build & Push (Multi-arch)"

          - powershell: |
              docker logout
              Write-Host "Imagen publicada: ${{ parameters.dockerUser }}/${{ parameters.imageName }}:${{ parameters.tag }}"
              Write-Host "Imagen publicada: ${{ parameters.dockerUser }}/${{ parameters.imageName }}:latest"
            displayName: "Docker Logout + Resumen"

      # =====================================================================
      # Job 4: Script - Hola Mundo x10 (PARALELO con Job 5)
      # =====================================================================
      - job: HolaMundo
        displayName: "Script - Hola Mundo x10 (Paralelo)"
        dependsOn: DockerBuildPush
        steps:
          - powershell: |
              Write-Host "========================================"
              Write-Host " Imprimiendo Hola Mundo 10 veces"
              Write-Host "========================================"
              for ($i = 1; $i -le 10; $i++) {
                Write-Host "[$i/10] Hola Mundo"
              }
              Write-Host "========================================"
              Write-Host " Completado."
              Write-Host "========================================"
            displayName: "PowerShell - Hola Mundo x10"

      # =====================================================================
      # Job 5: Script - Crear 10 archivos con fecha (PARALELO con Job 4)
      # =====================================================================
      - job: CrearArchivos
        displayName: "Script - Crear 10 archivos (Paralelo)"
        dependsOn: DockerBuildPush
        steps:
          - powershell: |
              Write-Host "========================================"
              Write-Host " Creando 10 archivos con fecha actual"
              Write-Host "========================================"

              $OutputDir = "$env:BUILD_STAGINGDIRECTORY\archivos_fecha"
              New-Item -ItemType Directory -Path $OutputDir -Force | Out-Null

              for ($i = 1; $i -le 10; $i++) {
                $Fecha = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                $Filename = "archivo_$i.txt"
                $Filepath = "$OutputDir\$Filename"
                $Contenido = "Archivo $i - Creado el: $Fecha"
                Set-Content -Path $Filepath -Value $Contenido
                Write-Host "Creado: $Filename -> $Contenido"
              }

              Write-Host ""
              Write-Host "========================================"
              Write-Host " Contenido de los archivos creados:"
              Write-Host "========================================"

              Get-ChildItem "$OutputDir\*.txt" | ForEach-Object {
                Write-Host ""
                Write-Host "--- $($_.Name) ---"
                Get-Content $_.FullName
              }

              Write-Host ""
              Write-Host "========================================"
              Write-Host " Completado: 10 archivos creados."
              Write-Host "========================================"
            displayName: "PowerShell - Crear y mostrar 10 archivos con fecha"
