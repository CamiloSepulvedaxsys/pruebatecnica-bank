apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-app-ingress
  namespace: flask-app
  labels:
    app: flask-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Para HTTPS con cert-manager (opcional):
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: flask-app.local  # Cambiar por dominio real en producción
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flask-app-service
                port:
                  number: 80
  # TLS (descomentar para HTTPS):
  # tls:
  #   - hosts:
  #       - flask-app.local
  #     secretName: flask-app-tls
