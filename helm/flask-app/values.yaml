replicaCount: 2

image:
  repository: ""  # e.g., docker.io/tuusuario/flask-app o tuacr.azurecr.io/flask-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: flask-app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

probes:
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10

namespace: flask-app
