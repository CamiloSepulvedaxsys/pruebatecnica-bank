sonar.projectKey=pruebatecnica
sonar.projectName=Prueba Tecnica - Flask App
sonar.projectVersion=1.0
sonar.sources=app
sonar.tests=app/tests
sonar.exclusions=app/tests/**
sonar.language=py
sonar.sourceEncoding=UTF-8
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Quality Gate - Escenarios de análisis:
# Escenario 1 (fallido): Quality Gate FAILED si cobertura < 80% o duplicación > 3%
# Escenario 2 (exitoso): Quality Gate PASSED cuando se cumplen los umbrales mínimos
sonar.qualitygate.wait=true
