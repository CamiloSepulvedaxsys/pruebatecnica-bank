# =============================================================================
# Azure DevOps CI/CD Pipeline - Prueba Técnica Banco
# Framework: Flask (Python) - Docker Samples
# =============================================================================
# Requisitos:
#   - Self-hosted Agent Pool ("SelfHosted") con Docker, Python, kubectl, sonar-scanner
#   - Variables de pipeline (configuradas en Azure DevOps UI):
#       DOCKER_USER      (ej: camiloxsys)
#       DOCKER_PASS      (secret - contraseña/token de Docker Hub)
#       SONAR_TOKEN      (secret - token de SonarQube)
# =============================================================================

trigger:
  branches:
    include:
      - main

pool:
  name: "SelfHosted"

variables:
  DOCKER_REGISTRY: "docker.io"
  DOCKER_USER_VAR: "camiloxsys"
  IMAGE_NAME: "flask-app"
  TAG: "$(Build.BuildId)"
  FULL_IMAGE: "$(DOCKER_USER_VAR)/$(IMAGE_NAME)"
  SONAR_HOST_URL: "http://localhost:9000"

# =============================================================================
# STAGES
# =============================================================================
stages:
  # ===========================================================================
  # Stage 1: Análisis de calidad con SonarQube
  # Escenario 1 - Análisis fallido | Escenario 2 - Análisis exitoso
  # ===========================================================================
  - stage: QualityAnalysis
    displayName: "Stage 1 - SonarQube Analysis"
    jobs:
      # -----------------------------------------------------------------------
      # Escenario 1: Análisis FALLIDO (tests sin cobertura)
      # -----------------------------------------------------------------------
      - job: SonarQube_Scenario_Failed
        displayName: "Escenario 1 - Análisis Fallido"
        steps:
          - script: |
              echo "============================================="
              echo " ESCENARIO 1: Simulación de análisis FALLIDO "
              echo "============================================="
              echo ""
              echo "En este escenario se demuestra qué ocurre cuando"
              echo "el Quality Gate de SonarQube NO se cumple."
              echo ""
              echo "Causas típicas de fallo:"
              echo "  - Cobertura de código menor a 80%%"
              echo "  - Duplicación mayor a 3%%"
              echo "  - Bugs o vulnerabilidades detectadas"
              echo "  - Code smells por encima del umbral"
              echo ""
              echo "Simulando ejecución de tests SIN cobertura..."
              py -m pip install -r app/requirements.txt -q
              cd app && py -m pytest tests/ -v --tb=short || true
              echo ""
              echo "RESULTADO: Quality Gate FAILED (sin reporte de cobertura)"
              echo "El pipeline NO continuaría a build en un escenario real."
              echo "============================================="
            displayName: "Escenario 1 - Tests sin cobertura"

          - script: |
              echo "##vso[task.logissue type=warning]ESCENARIO 1: Quality Gate FAILED - Cobertura insuficiente"
              echo "##vso[task.complete result=SucceededWithIssues;]Escenario 1 completado con advertencias"
            displayName: "Marcar escenario 1 como fallido"

      # -----------------------------------------------------------------------
      # Escenario 2: Análisis EXITOSO (tests con cobertura + SonarQube)
      # -----------------------------------------------------------------------
      - job: SonarQube_Scenario_Success
        displayName: "Escenario 2 - Análisis Exitoso"
        steps:
          - script: |
              py -m pip install -r app/requirements.txt -q
            displayName: "Instalar dependencias"

          - script: |
              echo "============================================="
              echo " ESCENARIO 2: Análisis EXITOSO               "
              echo "============================================="
              cd app && py -m pytest tests/ -v --cov=. --cov-report=xml:../coverage.xml --junitxml=../test-results.xml
              echo ""
              echo "Tests pasaron con cobertura completa."
            displayName: "Escenario 2 - Tests con cobertura"

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "test-results.xml"
            displayName: "Publicar resultados de tests"

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: "coverage.xml"
            displayName: "Publicar cobertura de código"

          - script: |
              echo "Ejecutando análisis SonarQube..."
              sonar-scanner -Dsonar.host.url=$(SONAR_HOST_URL) -Dsonar.token=$(SONAR_TOKEN)
              echo "Análisis completado. Quality Gate: OK"
            displayName: "SonarQube - Análisis y Quality Gate"

  # ===========================================================================
  # Stage 2: Build Docker y Push a Docker Hub
  # ===========================================================================
  - stage: BuildAndPush
    displayName: "Stage 2 - Docker Build & Push"
    dependsOn: QualityAnalysis
    condition: succeeded()
    jobs:
      - job: DockerBuildPush
        displayName: "Build y Push de imagen Docker"
        steps:
          - script: |
              echo "$(DOCKER_PASS)" | docker login -u "$(DOCKER_USER_VAR)" --password-stdin
              echo "Login exitoso a Docker Hub"
            displayName: "Docker Login"

          - script: |
              docker build -t $(FULL_IMAGE):$(TAG) -t $(FULL_IMAGE):latest .
              echo "Build completado: $(FULL_IMAGE):$(TAG)"
            displayName: "Docker Build"

          - script: |
              docker push $(FULL_IMAGE):$(TAG)
              docker push $(FULL_IMAGE):latest
              echo "Push completado a Docker Hub"
            displayName: "Docker Push"

          - script: |
              docker logout
              echo "Imagen publicada: $(FULL_IMAGE):$(TAG)"
              echo "Imagen publicada: $(FULL_IMAGE):latest"
            displayName: "Docker Logout + Resumen"

  # ===========================================================================
  # Stage 3: Scripts Bash/PowerShell (requisitos del ejercicio)
  # Jobs en PARALELO
  # ===========================================================================
  - stage: ScriptExecution
    displayName: "Stage 3 - Script Execution"
    dependsOn: BuildAndPush
    jobs:
      # -----------------------------------------------------------------------
      # Job 3a: Imprimir "Hola Mundo" 10 veces (PARALELO con Job 3b)
      # -----------------------------------------------------------------------
      - job: HolaMundo
        displayName: "3a - Hola Mundo x10 (Paralelo)"
        steps:
          - script: |
              echo "========================================"
              echo " Imprimiendo Hola Mundo 10 veces"
              echo "========================================"
              for /L %%i in (1,1,10) do echo [%%i/10] Hola Mundo
              echo "========================================"
              echo " Completado."
              echo "========================================"
            displayName: "CMD - Hola Mundo x10"

      # -----------------------------------------------------------------------
      # Job 3b: Crear 10 archivos con fecha (PARALELO con Job 3a)
      # -----------------------------------------------------------------------
      - job: CrearArchivos
        displayName: "3b - Crear 10 archivos con fecha (Paralelo)"
        steps:
          - pwsh: |
              Write-Host "========================================"
              Write-Host " Creando 10 archivos con fecha actual"
              Write-Host "========================================"

              $outputDir = Join-Path $env:BUILD_STAGINGDIRECTORY "archivos_fecha"
              New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

              for ($i = 1; $i -le 10; $i++) {
                  $fecha = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                  $filename = "archivo_$i.txt"
                  $filepath = Join-Path $outputDir $filename
                  $contenido = "Archivo $i - Creado el: $fecha"

                  Set-Content -Path $filepath -Value $contenido
                  Write-Host "Creado: $filename -> $contenido"
              }

              Write-Host ""
              Write-Host "========================================"
              Write-Host " Contenido de los archivos creados:"
              Write-Host "========================================"

              Get-ChildItem -Path $outputDir -Filter "*.txt" | ForEach-Object {
                  Write-Host ""
                  Write-Host "--- $($_.Name) ---"
                  Get-Content $_.FullName
              }

              Write-Host ""
              Write-Host "========================================"
              Write-Host " Completado: 10 archivos creados."
              Write-Host "========================================"
            displayName: "PowerShell - Crear y mostrar 10 archivos con fecha"

  # ===========================================================================
  # Stage 4: Deploy a Kubernetes (Minikube local)
  # ===========================================================================
  - stage: DeployToK8s
    displayName: "Stage 4 - Deploy to Kubernetes"
    dependsOn: ScriptExecution
    jobs:
      - job: DeployFlaskApp
        displayName: "Deploy Flask App a Kubernetes"
        steps:
          - script: |
              echo "Actualizando imagen en deployment.yaml..."
              powershell -Command "(Get-Content environment/deployment.yaml) -replace '__IMAGE__', '$(FULL_IMAGE):$(TAG)' | Set-Content environment/deployment.yaml"
              echo "Imagen configurada: $(FULL_IMAGE):$(TAG)"
            displayName: "Configurar imagen en manifiestos"

          - script: |
              echo "Aplicando manifiestos de Kubernetes..."
              kubectl apply -f environment/namespace.yaml
              kubectl apply -f environment/configmap.yaml
              kubectl apply -f environment/deployment.yaml
              kubectl apply -f environment/service.yaml
              kubectl apply -f environment/ingress.yaml
              echo ""
              echo "========================================"
              echo " Deploy completado exitosamente"
              echo " Imagen: $(FULL_IMAGE):$(TAG)"
              echo " Namespace: flask-app"
              echo "========================================"
            displayName: "kubectl apply - Deploy a K8s"

          - script: |
              echo "=== Estado del deploy ==="
              kubectl get all -n flask-app
              echo ""
              echo "=== Ingress ==="
              kubectl get ingress -n flask-app
            displayName: "Verificar deploy"
