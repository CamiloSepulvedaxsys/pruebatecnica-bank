# =============================================================================
# Azure DevOps CI/CD Pipeline - Prueba Técnica Banco
# Framework: Flask (Python) - Docker Samples
# =============================================================================
# Pipeline en agente self-hosted Windows con PowerShell
# 2 Stages (CI + CD) usando plantillas reutilizables
#
# Estructura:
#   pipelines/templates/
#     ├── variables.yml   → Variables compartidas
#     ├── ci.yml          → Stage CI: SonarQube, Docker Build & Push, Scripts
#     └── cd.yml          → Stage CD: Deploy a AKS (Azure Kubernetes Service)
#
# Variables de pipeline (configurar en Azure DevOps UI):
#   DOCKER_PASS              (secret) - Contraseña de Docker Hub
#   SONAR_TOKEN              (secret) - Token de SonarQube/SonarCloud
#   AZURE_SP_APP_ID          (secret) - App ID del Service Principal
#   AZURE_SP_SECRET          (secret) - Secret del Service Principal
#   AZURE_TENANT_ID                   - Tenant ID de Azure AD
#   AZURE_SUBSCRIPTION_ID             - ID de la suscripción Azure
# =============================================================================

trigger:
  branches:
    include:
      - main

pool:
  name: "SelfHosted"

variables:
  - template: pipelines/templates/variables.yml

stages:
  # ── CI: Análisis, Build, Scripts ──
  - template: pipelines/templates/ci.yml
    parameters:
      sonarHostUrl: $(SONAR_HOST_URL)
      dockerUser: $(DOCKER_USER_VAR)
      imageName: $(IMAGE_NAME)
      tag: $(TAG)

  # ── CD: Deploy a AKS ──
  - template: pipelines/templates/cd.yml
    parameters:
      fullImage: $(FULL_IMAGE)
      tag: $(TAG)
      resourceGroup: $(AZURE_RG)
      clusterName: $(AKS_CLUSTER_NAME)
